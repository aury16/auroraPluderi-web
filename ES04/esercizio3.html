<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Calcolatrice Semplice</title>
</head>
<body>

<h1>Calcolatrice</h1>

<!-- Form che richiama la funzione calcola() senza ricaricare la pagina -->
<form id="calculatorForm" onsubmit="calcola(); return false;">
    Primo numero:
    <input type="text" id="num1" required>
    <br>

    Secondo numero:
    <input type="text" id="num2" required>
    <br>

    Operazione:
    <input type="text" id="operation" placeholder="+, -, *, /, **" required>
    <br>

    <button type="submit">Calcola</button>
</form>

<!-- Div per visualizzare il risultato o gli errori -->
<div id="result"></div>

<script>
// Funzione chiamata al submit del form
function calcola() {

    // Legge i valori inseriti dall'utente come stringhe
    const num1Input = document.getElementById('num1').value;
    const num2Input = document.getElementById('num2').value;
    const operation = document.getElementById('operation').value.trim(); // trim() rimuove spazi

    // Div dove mostrare il risultato
    const resultDiv = document.getElementById('result');

    // Converte le stringhe in numeri decimali
    const num1 = parseFloat(num1Input);
    const num2 = parseFloat(num2Input);

    // Controllo validità dei numeri
    if (Number.isNaN(num1) || Number.isNaN(num2)) {
        resultDiv.textContent = 'Errore: Inserisci due numeri validi.';
        return; // Interrompe la funzione
    }

    let result; // Variabile che conterrà il risultato

    try {
        // Esegue l'operazione richiesta
        switch (operation) {
            case "+":
                result = num1 + num2;
                break;

            case "-":
                result = num1 - num2;
                break;

            case "*":
                result = num1 * num2;
                break;

            case "/":
                if (num2 === 0) {
                    throw new Error("Divisione per zero non consentita.");
                }
                result = num1 / num2;
                break;

            case "**":
                result = num1 ** num2; // Potenza
                break;

            default:
                throw new Error("Operazione non valida. Usa +, -, *, / oppure **");
        }

        // Mostra il risultato
        resultDiv.textContent = "Risultato: " + result;

    } catch (error) {
        // Mostra eventuali errori
        resultDiv.textContent = "Errore: " + error.message;
    }
}
</script>

</body>
</html>
