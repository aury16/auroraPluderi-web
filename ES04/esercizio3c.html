<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Calcolatrice Carina</title>
    <style>
        /* Stile generale della pagina */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Contenitore della calcolatrice */
        .calculator {
            background-color: #ffffffcc;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        /* Stile degli input */
        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #6c63ff;
            box-shadow: 0 0 5px #6c63ff;
        }

        /* Stile del pulsante */
        button {
            padding: 10px 25px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background-color: #6c63ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #5750d4;
            transform: scale(1.05);
        }

        /* Stile del risultato */
        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

<div class="calculator">
    <h1>Calcolatrice</h1>

    <form id="calculatorForm" onsubmit="calcola(); return false;">
        <input type="text" id="num1" placeholder="Primo numero" required><br>
        <input type="text" id="num2" placeholder="Secondo numero" required><br>
        <input type="text" id="operation" placeholder="Operazione (+, -, *, /, **) " required><br>
        <button type="submit">Calcola</button>
    </form>

    <div id="result"></div>
</div>

<script>
function calcola() {
    const num1Input = document.getElementById('num1').value;
    const num2Input = document.getElementById('num2').value;
    const operation = document.getElementById('operation').value.trim();
    const resultDiv = document.getElementById('result');

    const num1 = parseFloat(num1Input);
    const num2 = parseFloat(num2Input);

    if (Number.isNaN(num1) || Number.isNaN(num2)) {
        resultDiv.textContent = 'Errore: Inserisci due numeri validi.';
        return;
    }

    let result;
    try {
        switch (operation) {
            case "+": result = num1 + num2; break;
            case "-": result = num1 - num2; break;
            case "*": result = num1 * num2; break;
            case "/":
                if (num2 === 0) throw new Error("Divisione per zero non consentita.");
                result = num1 / num2; break;
            case "**": result = num1 ** num2; break;
            default: throw new Error("Operazione non valida. Usa +, -, *, / oppure **");
        }
        resultDiv.textContent = "Risultato: " + result;
    } catch (error) {
        resultDiv.textContent = "Errore: " + error.message;
    }
}
</script>

</body>
</html>
