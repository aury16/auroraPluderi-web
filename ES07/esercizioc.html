<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Esercizio C - Pulsanti</title>
</head>

<body>

    <h1>Pulsanti colorati</h1>

    <button>Bottone 1</button>
    <button>Bottone 2</button>

    <script>

        // seleziono tutti i bottoni della pagina
        let bottoni = document.querySelectorAll("button");

        // ciclo tutti i bottoni
        for (let i = 0; i < bottoni.length; i++) {

            // cambio il colore di sfondo
            bottoni[i].style.backgroundColor = "blue";

            // cambio il colore del testo
            bottoni[i].style.color = "white";
        }

    </script>

</body>

</html>
