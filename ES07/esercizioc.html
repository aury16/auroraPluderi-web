<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Esercizio C - Pulsanti</title>
</head>
<body>

    <h1>Pulsanti colorati</h1>

    <button>Bottone 1</button>
    <button>Bottone 2</button>

    <script>
        // 1. Seleziono tutti i bottoni della pagina
        const bottoni = document.querySelectorAll("button");

        // 2. Ciclo tutti i bottoni per cambiare lo stile via JavaScript
        bottoni.forEach(bottone => {
            // Cambio il colore di sfondo in blu
            bottone.style.backgroundColor = "blue";
            // Cambio il colore del testo in bianco
            bottone.style.color = "white";
        });
    </script>

</body>
</html>
