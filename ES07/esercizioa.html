<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Esercizio A - Window</title>
</head>

<body>

    <h1>Oggetto Window, per vedere fai F12</h1>

    <script>

        // stampo la larghezza della finestra
        console.log("Larghezza:", window.innerWidth);

        // stampo l'altezza della finestra
        console.log("Altezza:", window.innerHeight);

        // stampo l'URL della pagina
        console.log("URL:", window.location.href);

        // mostro un messaggio popup
        window.alert("Benvenuto nella pagina Window!");

    </script>

</body>

</html>
