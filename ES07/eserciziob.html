<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Esercizio B - Navigator</title>
</head>
<body>

<h1>Oggetto Navigator</h1>

<script>

// mostro info sul browser
console.log("User Agent:", navigator.userAgent);

// lingua del browser
console.log("Lingua:", navigator.language);

// stato connessione
console.log("Online:", navigator.onLine);

// cookie attivi o no
console.log("Cookie:", navigator.cookieEnabled);

</script>

</body>
</html>
