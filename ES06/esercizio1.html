<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .btn { background: #007bff; color: white; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; }
        
        /* Questo è il box della tua foto */
        #output {
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            max-width: 400px;
            background-color: #f8d7da; /* Rosa errore */
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 10px;
            display: none; /* Nascosto finché non logghiamo qualcosa */
        }
    </style>
</head>
<body>

    <h1>Calcolatrice JS</h1>
    <button class="btn" onclick="avvia()">Avvia Calcolo</button>

    <div id="output"></div>

    <script>
        // --- IL TRUCCO: Riorientiamo console.log verso la pagina ---
        const box = document.getElementById("output");
        
        console.log = function(messaggio) {
            box.innerHTML = messaggio; // Scrive il messaggio nel box rosa
            box.style.display = "block"; // Rende il box visibile
        };
        // -----------------------------------------------------------

        function avvia() {
            let larghezza = parseFloat(prompt("Inserisci la larghezza:"));
            let altezza = parseFloat(prompt("Inserisci l'altezza:"));
            let lunghezza = parseFloat(prompt("Inserisci la lunghezza:"));

            let volume = larghezza * altezza * lunghezza;

            if (isNaN(volume)) {
                // USIAMO CONSOLE.LOG COME RICHIESTO
                // Ora questo non va più nella console segreta, ma appare nel box rosa!
                console.log("Errore: Inserisci numeri validi!"); 
            } else {
                console.log("Il volume calcolato è: " + volume);
            }
        }
    </script>

</body>
</html>
