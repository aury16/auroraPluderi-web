<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px; 
        }

        .btn { 
            background: #007bff; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 5px; 
            border: none; 
            cursor: pointer; 
        }

        #output {
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            max-width: 400px;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Calcolatrice JS</h1>

    <button class="btn" onclick="calcola()">Avvia Calcolo</button>

    <div id="output"></div>

    <script>
        const box = document.getElementById("output");

        // Funzione per mostrare messaggi nella pagina
        function mostra(messaggio) {
            box.innerHTML = messaggio;
            box.style.display = "block";
        }

        function calcola() {

            // Input utente
            let num1 = parseFloat(prompt("Inserisci il primo numero:"));
            let operazione = prompt("Inserisci operazione (+ - * / **):");
            let num2 = parseFloat(prompt("Inserisci il secondo numero:"));

            // Controllo numeri validi
            if (isNaN(num1) || isNaN(num2)) {
                mostra("Errore: devi inserire numeri validi!");
                return;
            }

            let risultato;

            // Controllo operazione
            if (operazione === "+") {
                risultato = num1 + num2;
            } 
            else if (operazione === "-") {
                risultato = num1 - num2;
            } 
            else if (operazione === "*") {
                risultato = num1 * num2;
            } 
            else if (operazione === "/") {
                if (num2 === 0) {
                    mostra("Errore: divisione per zero!");
                    return;
                }
                risultato = num1 / num2;
            } 
            else if (operazione === "**") {
                risultato = num1 ** num2;
            } 
            else {
                mostra("Errore: operazione non valida!");
                return;
            }

            // Output finale
            mostra("Risultato: " + risultato);
        }
    </script>

</body>
</html>
