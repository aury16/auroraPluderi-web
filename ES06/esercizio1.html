<body>

    <h1>Calcolatrice JS</h1>

    <!-- Bottone che avvia la funzione -->
    <button class="btn" onclick="avvia()">Avvia Calcolo</button>

    <!-- Contenitore per mostrare output -->
    <div id="output"></div>

    <script>
        // Prendiamo il riferimento al box HTML
        const box = document.getElementById("output");
        
        // Sovrascriviamo console.log per mostrare i messaggi nella pagina
        console.log = function(messaggio) {
            box.innerHTML = messaggio; // inserisce il testo nel box
            box.style.display = "block"; // rende visibile il box
        };

        // Funzione principale chiamata dal bottone
        function avvia() {

            // Chiediamo i dati all’utente (stringhe)
            let larghezza = prompt("Inserisci la larghezza:");
            let altezza = prompt("Inserisci l'altezza:");
            let lunghezza = prompt("Inserisci la lunghezza:");

            // Controllo: se l'utente annulla o lascia vuoto
            if (!larghezza || !altezza || !lunghezza) {
                console.log("Errore: hai annullato o lasciato un campo vuoto!");
                return; // blocca la funzione
            }

            // Convertiamo le stringhe in numeri decimali
            larghezza = parseFloat(larghezza);
            altezza = parseFloat(altezza);
            lunghezza = parseFloat(lunghezza);

            // Controllo: se uno dei valori non è un numero
            if (isNaN(larghezza) || isNaN(altezza) || isNaN(lunghezza)) {
                console.log("Errore: Inserisci numeri validi!");
                return; // blocca la funzione
            }

            // Calcolo del volume (formula: larghezza × altezza × lunghezza)
            let volume = larghezza * altezza * lunghezza;

            // Mostriamo il risultato
            console.log("Il volume calcolato è: " + volume);
        }
    </script>

</body>
