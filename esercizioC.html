<h1>Es03C - Esito Esame</h1>
<script>
    let voto = 7;
    let esito = (voto >= 6) ? "Promosso" : "Bocciato";

    // Questo lo vedi nella console (F12)
    console.log("Voto ottenuto: " + voto);
    
    // Questo farà apparire una finestrella pop-up
    alert("Voto: " + voto + "\nEsito: " + esito);

    // Questo scriverà direttamente sulla pagina bianca
    document.write("<h2>Risultato: " + esito + "</h2>");
</script>
