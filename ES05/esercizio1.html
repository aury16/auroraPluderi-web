<!DOCTYPE html>
<html>
<body>

<!-- Titolo -->
<h2>Inserisci i tuoi dati</h2>

<!-- Form -->
<form id="form">

  <!-- Input nome -->
  <input type="text" id="nome" placeholder="Nome"><br><br>

  <!-- Input cognome -->
  <input type="text" id="cognome" placeholder="Cognome"><br><br>

  <!-- Input età -->
  <input type="number" id="eta" placeholder="Età"><br><br>

  <!-- Pulsante -->
  <button>Invia</button>

</form>

<script>

// Quando invio il form
document.getElementById("form").onsubmit = function(e) {

  // Blocca il refresh della pagina
  e.preventDefault();

  // Prendo i valori dagli input
  let nome = document.getElementById("nome").value;
  let cognome = document.getElementById("cognome").value;
  let eta = document.getElementById("eta").value;

  // Creo l'oggetto persona
  let persona = {
    nome: nome,
    cognome: cognome,
    eta: eta
  };

  // Stampo tutto in console
  console.log(persona);
};

</script>

</body>
</html>
