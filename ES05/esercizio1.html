<!DOCTYPE html>
<html>
<head>
  <title>Esercizio Persona</title>
</head>
<body>

  <!-- Titolo della pagina -->
  <h2>Inserisci i tuoi dati</h2>

  <!-- Form per inserire i dati -->
  <form id="formPersona">

    <!-- Campo per il nome -->
    Nome: <input type="text" id="nome"><br><br>

    <!-- Campo per il cognome -->
    Cognome: <input type="text" id="cognome"><br><br>

    <!-- Campo per l'età -->
    Età: <input type="number" id="eta"><br><br>

    <!-- Pulsante per inviare il form -->
    <button type="submit">Invia</button>

  </form>

  <script>

    // Prendo il form tramite il suo id
    let form = document.getElementById("formPersona");

    // Aggiungo un "ascoltatore" di eventi al form
    // Questo codice si attiva quando l'utente preme il pulsante "Invia"
    form.addEventListener("submit", function(event) {

      // Blocca il comportamento predefinito del form
      // (cioè il ricaricamento della pagina)
      event.preventDefault();

      // Prendo il valore inserito nel campo nome
      let nome = document.getElementById("nome").value;

      // Prendo il valore inserito nel campo cognome
      let cognome = document.getElementById("cognome").value;

      // Prendo il valore inserito nel campo età
      let eta = document.getElementById("eta").value;

      // Creo un oggetto chiamato "persona"
      // e assegno i valori inseriti dall'utente
      let persona = {
        nome: nome,         // proprietà nome
        cognome: cognome,   // proprietà cognome
        eta: eta            // proprietà età
      };

      // Stampo l'intero oggetto nella console
      console.log(persona);

      // Stampo anche le singole proprietà (facoltativo)
      console.log("Nome:", persona.nome);
      console.log("Cognome:", persona.cognome);
      console.log("Età:", persona.eta);

    });

  </script>

</body>
</html>
